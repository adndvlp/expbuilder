  <body>
    
  

<script id="generated-script">

  // --- FileUploadResponseComponent endpoint (local Express server) ---
  window.JSPSYCH_FILE_UPLOAD_ENDPOINT = '/api/participant-files/b116f718-cfee-4d6d-82d0-5c8f948ecb6a';

  // --- Session Name Configuration ---
  const _SESSION_NAME_TOKENS = [];
  const _SESSION_NAME_SEPARATOR = "_";
  function _generateSessionName(participantNumber) {
    if (!_SESSION_NAME_TOKENS || _SESSION_NAME_TOKENS.length === 0) return null;
    const _now = new Date();
    const _pad = (n, len) => String(n).padStart(len != null ? len : 2, '0');
    const _y = _now.getFullYear();
    const _mo = _pad(_now.getMonth() + 1);
    const _d = _pad(_now.getDate());
    const _h = _pad(_now.getHours());
    const _mi = _pad(_now.getMinutes());
    const _s = _pad(_now.getSeconds());
    const _parts = _SESSION_NAME_TOKENS.map(function(_token) {
      switch (_token.type) {
        case 'date': {
          if (_token.dateFormat === 'YYYYMMDD') return _y + '' + _mo + _d;
          if (_token.dateFormat === 'DD-MM-YYYY') return _d + '-' + _mo + '-' + _y;
          if (_token.dateFormat === 'MM-DD-YYYY') return _mo + '-' + _d + '-' + _y;
          return _y + '-' + _mo + '-' + _d;
        }
        case 'time': {
          if (_token.timeFormat === 'HH-mm') return _h + '-' + _mi;
          if (_token.timeFormat === 'HHmmss') return _h + '' + _mi + _s;
          return _h + '-' + _mi + '-' + _s;
        }
        case 'randomAlpha': {
          const _chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
          return Array.from({ length: _token.randomLength || 6 }, function() {
            return _chars[Math.floor(Math.random() * _chars.length)];
          }).join('');
        }
        case 'customText': return _token.customValue || '';
        case 'counter': {
          if (participantNumber == null) return '__CNT__';
          return _pad(participantNumber, _token.counterDigits || 3);
        }
        default: return '';
      }
    }).filter(function(p) { return p !== ''; });
    // Safety net: if no randomAlpha or counter token, append a 6-char random suffix for uniqueness
    const _hasUnique = _SESSION_NAME_TOKENS.some(function(t) { return t.type === 'randomAlpha' || t.type === 'counter'; });
    if (!_hasUnique && _parts.length > 0) {
      const _rc = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      _parts.push(Array.from({ length: 6 }, function() { return _rc[Math.floor(Math.random() * _rc.length)]; }).join(''));
    }
    return _parts.length > 0 ? _parts.join(_SESSION_NAME_SEPARATOR) : null;
  }
  function _sessionNameHasDynamic() {
    return _SESSION_NAME_TOKENS.some(function(t) { return t.type === 'counter'; });
  }
  async function _renameSessionIfNeeded(oldId, newId) {
    if (!oldId || !newId || oldId === newId) return oldId;
    try {
      const _r = await fetch('/api/rename-session/b116f718-cfee-4d6d-82d0-5c8f948ecb6a', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ oldSessionId: oldId, newSessionId: newId })
      });
      if (_r.ok) return newId;
    } catch(e) {}
    return oldId;
  }

  // --- Recolectar metadata del sistema ---
  const getMetadata = () => {
    const ua = navigator.userAgent;    let browserName = 'Unknown';
    let browserVersion = 'Unknown';
    
    if (ua.indexOf('Firefox') > -1) {
      browserName = 'Firefox';
      browserVersion = ua.match(/Firefox\/(\d+\.\d+)/)?.[1] || 'Unknown';
    } else if (ua.indexOf('Chrome') > -1) {
      browserName = 'Chrome';
      browserVersion = ua.match(/Chrome\/(\d+\.\d+)/)?.[1] || 'Unknown';
    } else if (ua.indexOf('Safari') > -1) {
      browserName = 'Safari';
      browserVersion = ua.match(/Version\/(\d+\.\d+)/)?.[1] || 'Unknown';
    } else if (ua.indexOf('Edg') > -1) {
      browserName = 'Edge';
      browserVersion = ua.match(/Edg\/(\d+\.\d+)/)?.[1] || 'Unknown';
    }
    
    let osName = 'Unknown';
    if (ua.indexOf('Win') > -1) osName = 'Windows';
    else if (ua.indexOf('Mac') > -1) osName = 'macOS';
    else if (ua.indexOf('Linux') > -1) osName = 'Linux';
    else if (ua.indexOf('Android') > -1) osName = 'Android';
    else if (ua.indexOf('iOS') > -1) osName = 'iOS';
    
    return {
      browser: browserName,
      browserVersion: browserVersion,
      os: osName,
      screenWidth: window.screen.width,
      screenHeight: window.screen.height,
      screenResolution: `${window.screen.width}x${window.screen.height}`,
      viewportWidth: window.innerWidth,
      viewportHeight: window.innerHeight,
      language: navigator.language,
      userAgent: ua,
      startedAt: new Date().toISOString()
    };
  };
  
  const metadata = getMetadata();

  // --- Socket.IO para tracking en tiempo real ---
  const socketScript = document.createElement('script');
  socketScript.src = '/socket.io/socket.io.js';
  socketScript.onload = () => {
    window._socketReady = true;
  };
  document.head.appendChild(socketScript);

  function waitForSocket() {
    return new Promise(resolve => {
      if (window._socketReady) return resolve();
      const interval = setInterval(() => {
        if (window._socketReady) {
          clearInterval(interval);
          resolve();
        }
      }, 50);
    });
  }

  // Recuperar sessionId de localStorage o crear uno nuevo
  let trialSessionId = localStorage.getItem('jsPsych_currentSessionId');
  let isResuming = false;

  if (!trialSessionId) {
    trialSessionId = _generateSessionName(null) || (crypto.randomUUID
      ? crypto.randomUUID()
      : Math.random().toString(36).slice(2, 10));
  } else {
    isResuming = true;
  }

  // Setear JSPSYCH_SESSION_ID inmediatamente para que FileUpload tenga siempre el sessionId
  window.JSPSYCH_SESSION_ID = trialSessionId;

  let participantNumber;
  let socket;

  async function saveSession(trialSessionId) {
   
   const res = await fetch("/api/append-result/b116f718-cfee-4d6d-82d0-5c8f948ecb6a", {
      method: "POST",
      headers: { "Content-Type": "application/json", Accept: "*/*" },
      body: JSON.stringify({
        sessionId: trialSessionId,
        metadata: metadata
      }),
    });
  
    const result = await res.json();
    participantNumber = result.participantNumber;
    return participantNumber;
    
  }

  
  // --- Loading overlay ---
  // Read body background at runtime to match canvas styles injected via <style>
  const _bgColor = (getComputedStyle(document.body).backgroundColor || '').trim();
  const _overlayBg = _bgColor && _bgColor !== 'rgba(0, 0, 0, 0)' && _bgColor !== 'transparent' ? _bgColor : '#fff';
  const _loadingOverlay = document.createElement('div');
  _loadingOverlay.id = 'jspsych-loading-overlay';
  _loadingOverlay.style.cssText = [
    'position:fixed', 'inset:0', 'z-index:9999',
    'display:flex', 'flex-direction:column',
    'align-items:center', 'justify-content:center',
    'background:' + _overlayBg, 'gap:20px',
    'font-family:sans-serif'
  ].join(';');
  _loadingOverlay.innerHTML = `
    <div style="width:48px;height:48px;border:5px solid #e0e0e0;border-top-color:#555;border-radius:50%;animation:_spin 0.8s linear infinite"></div>
    <p id="jspsych-loading-msg" style="margin:0;color:#555;font-size:15px">Initializing experiment…</p>
    <style>@keyframes _spin{to{transform:rotate(360deg)}}</style>
  `;
  document.body.appendChild(_loadingOverlay);

  function _setLoadingMsg(msg) {
    const el = document.getElementById('jspsych-loading-msg');
    if (el) el.textContent = msg;
  }

  function _hideLoading() {
    const el = document.getElementById('jspsych-loading-overlay');
    if (el) el.remove();
  }

  function _showSuccess() {
    _hideLoading();
    const overlay = document.createElement('div');
    overlay.id = 'jspsych-loading-overlay';
    overlay.style.cssText = [
      'position:fixed', 'inset:0', 'z-index:9999',
      'display:flex', 'flex-direction:column',
      'align-items:center', 'justify-content:center',
      'background:' + _overlayBg, 'gap:16px',
      'font-family:sans-serif'
    ].join(';');
    overlay.innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="30" fill="#22c55e"/>
        <polyline points="18,33 28,43 46,22" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p style="margin:0;color:#111;font-size:18px;font-weight:600">Experiment complete. Thank you!</p>
      <p style="margin:0;color:#555;font-size:14px">You can now close this window.</p>
    `;
    document.body.appendChild(overlay);
  }

  function _showLoading(msg) {
    _hideLoading();
    const overlay = document.createElement('div');
    overlay.id = 'jspsych-loading-overlay';
    overlay.style.cssText = [
      'position:fixed', 'inset:0', 'z-index:9999',
      'display:flex', 'flex-direction:column',
      'align-items:center', 'justify-content:center',
      'background:' + _overlayBg, 'gap:20px',
      'font-family:sans-serif'
    ].join(';');
    overlay.innerHTML = `
      <div style="width:48px;height:48px;border:5px solid #e0e0e0;border-top-color:#555;border-radius:50%;animation:_spin 0.8s linear infinite"></div>
      <p id="jspsych-loading-msg" style="margin:0;color:#555;font-size:15px">${msg || 'Please wait…'}</p>
      <style>@keyframes _spin{to{transform:rotate(360deg)}}</style>
    `;
    document.body.appendChild(overlay);
  }

  
  // Resuelve a qué trial saltar al reanudar evaluando las branch conditions guardadas.
  // Retorna el id (string) del trial destino, o null si no hay punto de retoma.
  function _resolveResumeBranch(resumeRaw) {
    if (!resumeRaw) return null;
    try {
      const d = JSON.parse(resumeRaw);
      const branches = d.branches || [];
      const branchConditions = d.branchConditions || [];
      const trialData = d.trialData || {};

      if (branches.length === 0) return null; // trial terminal, experimento terminó
      if (branches.length === 1) return String(branches[0]); // único branch, sin condiciones

      // Múltiples branches: evaluar condiciones (OR entre condiciones, AND entre reglas)
      const flat = Array.isArray(branchConditions[0])
        ? branchConditions.flat()
        : branchConditions;

      for (let i = 0; i < flat.length; i++) {
        const cond = flat[i];
        if (!cond || !cond.rules) continue;
        const match = cond.rules.every(rule => {
          let col = rule.column || '';
          if (!col && rule.componentIdx && rule.prop) col = rule.componentIdx + '_' + rule.prop;
          else if (!col && rule.prop) col = rule.prop;
          let val = trialData[col];
          // Manejar respuestas anidadas (SurveyComponent)
          if (val === undefined) {
            const parts = col.split('_');
            if (parts.length >= 2) {
              const resp = trialData[parts.slice(0, -1).join('_') + '_response'];
              if (resp && typeof resp === 'object') val = resp[parts[parts.length - 1]];
            }
          }
          // Respuestas en array (multi-select)
          if (Array.isArray(val)) {
            const has = val.includes(rule.value) || val.includes(String(rule.value));
            return rule.op === '==' ? has : rule.op === '!=' ? !has : false;
          }
          const n1 = parseFloat(val), n2 = parseFloat(rule.value);
          const isNum = !isNaN(n1) && !isNaN(n2);
          switch (rule.op) {
            case '==': return isNum ? n1 === n2 : val == rule.value;
            case '!=': return isNum ? n1 !== n2 : val != rule.value;
            case '>':  return isNum && n1 > n2;
            case '<':  return isNum && n1 < n2;
            case '>=': return isNum && n1 >= n2;
            case '<=': return isNum && n1 <= n2;
            default:   return false;
          }
        });
        if (match && i < branches.length) return String(branches[i]);
      }
      return String(branches[0]); // fallback al primero si ninguna condición matchea
    } catch (e) {
      return null; // datos corruptos
    }
  }


  (async () => {

    // Leer datos de retoma ANTES de cualquier limpieza
    const resumeRaw = localStorage.getItem('jsPsych_resumeTrial');
    const existingJump = localStorage.getItem('jsPsych_jumpToTrial');

    // Guard contra bucle infinito: si la última recarga fue un intento de jump
    // y el key sigue intacto (ningún trial lo consumió), borrar todo y empezar limpio.
    const comingFromJumpReload = sessionStorage.getItem('jsPsych_jumpReload') === '1';
    sessionStorage.removeItem('jsPsych_jumpReload');
    if (comingFromJumpReload && existingJump) {
      localStorage.removeItem('jsPsych_jumpToTrial');
      localStorage.removeItem('jsPsych_resumeTrial');
      localStorage.removeItem('jsPsych_currentSessionId');
      localStorage.removeItem('jsPsych_participantNumber');
      // Reinicar variables de sesión para que el experimento arranque limpio
      trialSessionId = _generateSessionName(null) || (crypto.randomUUID
        ? crypto.randomUUID()
        : Math.random().toString(36).slice(2, 10));
      isResuming = false;
    } else if (!existingJump) {
      // Sin jump pendiente: derivar destino desde el último trial completado
      localStorage.removeItem('jsPsych_jumpToTrial');
      const jumpTarget = _resolveResumeBranch(resumeRaw);
      localStorage.removeItem('jsPsych_resumeTrial');
      if (jumpTarget) localStorage.setItem('jsPsych_jumpToTrial', jumpTarget);
    } else {
      // Jump ya establecido por repeat/jump — preservarlo, solo limpiar resume
      localStorage.removeItem('jsPsych_resumeTrial');
    }

    // Esperar a que Socket.IO esté listo
    await waitForSocket();
    socket = io();
    
    if (isResuming) {
      // Sesión existente (retoma o repeat/jump): recuperar participantNumber del localStorage
      // para evitar crear una sesión duplicada en el backend
      const storedPN = localStorage.getItem('jsPsych_participantNumber');
      if (storedPN && !isNaN(Number(storedPN))) {
        participantNumber = Number(storedPN);
      } else {
        // Número de participante perdido — recrear sesión como nueva
        _setLoadingMsg('Creating session…');
        participantNumber = await saveSession(trialSessionId);
      }
    } else {
      _setLoadingMsg('Creating session…');
      participantNumber = await saveSession(trialSessionId);
      // Rename session once participantNumber is known (dynamic tokens: counter)
      if (_sessionNameHasDynamic() && typeof participantNumber === 'number' && !isNaN(participantNumber)) {
        const _finalId = _generateSessionName(participantNumber);
        if (_finalId && _finalId !== trialSessionId) {
          trialSessionId = await _renameSessionIfNeeded(trialSessionId, _finalId);
          window.JSPSYCH_SESSION_ID = trialSessionId;
        }
      }
    }

    // Si falla con el sessionId existente (sesión huérfana), reintentar con uno nuevo
    // IMPORTANTE: NO borrar jsPsych_resumeTrial aquí para no perder el punto de retoma
    if (typeof participantNumber !== "number" || isNaN(participantNumber)) {
      localStorage.removeItem('jsPsych_currentSessionId');
      localStorage.removeItem('jsPsych_participantNumber');
      trialSessionId = _generateSessionName(null) || (crypto.randomUUID
        ? crypto.randomUUID()
        : Math.random().toString(36).slice(2, 10));
      isResuming = false;
      _setLoadingMsg('Creating session…');
      participantNumber = await saveSession(trialSessionId);
      if (_sessionNameHasDynamic() && typeof participantNumber === 'number' && !isNaN(participantNumber)) {
        const _finalId = _generateSessionName(participantNumber);
        if (_finalId && _finalId !== trialSessionId) {
          trialSessionId = await _renameSessionIfNeeded(trialSessionId, _finalId);
        }
      }
    }

    if (typeof participantNumber !== "number" || isNaN(participantNumber)) {
      alert("The participant number is not assigned. Please, wait.");
      throw new Error("participantNumber not assigned");
    }

    // Guardar sessionId en localStorage para futuras retomas
    localStorage.setItem('jsPsych_currentSessionId', trialSessionId);
    localStorage.setItem('jsPsych_participantNumber', participantNumber.toString());

    // Conectar sesión con el servidor via WebSocket
    socket.emit('join-experiment', {
      experimentID: 'b116f718-cfee-4d6d-82d0-5c8f948ecb6a',
      sessionId: trialSessionId,
      state: isResuming ? 'resumed' : 'initiated',
      metadata: metadata
    });

    // --- Branching logic functions (outside initJsPsych for timeline access) ---
    window.nextTrialId = null;
    window.skipRemaining = false;
    window.branchingActive = false;
    window.branchCustomParameters = null; // Store custom parameters for the next trial

    const evaluateCondition = (trialData, condition) => {
      // All rules in a condition must be true (AND logic)
      return condition.rules.every(rule => {
        // Construct column name from componentIdx and prop if column is empty
        // This handles dynamic plugins like ButtonResponseComponent_1_response
        let columnName = rule.column || "";
        if (!columnName && rule.componentIdx && rule.prop) {
          columnName = rule.componentIdx + '_' + rule.prop;
        } else if (!columnName && rule.prop) {
          columnName = rule.prop;
        }
        
        if (!columnName) {
          console.warn('No column name specified in rule:', rule);
          return false;
        }
        
        // Get value directly from the column
        const propValue = trialData[columnName];
        
        if (propValue === undefined) {
          console.warn('Column not found in trial data:', columnName);
          return false;
        }
        
        const compareValue = rule.value;
        
        // Handle array responses (multi-select or single-select returned as array)
        if (Array.isArray(propValue)) {
          const matches = propValue.includes(compareValue) || propValue.includes(String(compareValue));
          switch (rule.op) {
            case '==':
              return matches;
            case '!=':
              return !matches;
            default:
              return false;
          }
        }
        
        // Convert values for comparison (for non-array values)
        const numPropValue = parseFloat(propValue);
        const numCompareValue = parseFloat(compareValue);
        const isNumeric = !isNaN(numPropValue) && !isNaN(numCompareValue);
        
        switch (rule.op) {
          case '==':
            return isNumeric ? numPropValue === numCompareValue : propValue == compareValue;
          case '!=':
            return isNumeric ? numPropValue !== numCompareValue : propValue != compareValue;
          case '>':
            return isNumeric && numPropValue > numCompareValue;
          case '<':
            return isNumeric && numPropValue < numCompareValue;
          case '>=':
            return isNumeric && numPropValue >= numCompareValue;
          case '<=':
            return isNumeric && numPropValue <= numCompareValue;
          default:
            return false;
        }
      });
    };
    
    const getNextTrialId = (lastTrialData) => {
      if (!lastTrialData || !lastTrialData.trials || !lastTrialData.trials[0]) {
        return null;
      }
      
      const trial = lastTrialData.trials[0];
      
      // Check if trial/loop has branches
      if (!Array.isArray(trial.branches) || trial.branches.length === 0) {
        return null;
      }
      
      // Check if there are conditions to evaluate
      const hasBranchConditions = Array.isArray(trial.branchConditions) && trial.branchConditions.length > 0;
      
      // Check if any condition has customParameters
      const hasCustomParameters = hasBranchConditions && 
        trial.branchConditions.flat().some(condition => 
          condition && condition.customParameters && 
          Object.keys(condition.customParameters).length > 0
        );
      
      // If there are no conditions AND no custom parameters, auto-branch to first branch
      if (!hasBranchConditions && !hasCustomParameters) {
        console.log('No conditions or custom parameters defined, auto-branching to first branch:', trial.branches[0]);
        return trial.branches[0];
      }
      
      // If there are no conditions but there ARE custom parameters, we can't auto-branch
      // We need to evaluate conditions to know which customParameters to use
      if (!hasBranchConditions && hasCustomParameters) {
        console.log('Custom parameters exist but no conditions, cannot auto-branch');
        return null;
      }
      
      // If there ARE conditions, evaluate them (regardless of how many branches there are)
      // branchConditions is an array of arrays, flatten it first
      const conditions = trial.branchConditions.flat();
      
      // Evaluate each condition (OR logic between conditions)
      for (const condition of conditions) {
        if (!condition || !condition.rules) {
          console.warn('Invalid condition structure:', condition);
          continue;
        }
        
        if (evaluateCondition(trial, condition)) {
          // Store custom parameters if they exist
          if (condition.customParameters) {
            window.branchCustomParameters = condition.customParameters;
          }
          return condition.nextTrialId;
        }
      }
      
      // No condition matched - do NOT branch (conditions were defined but none matched)
      return null;
    };

    _hideLoading();

    // Track pending data saves to ensure all complete before finishing
    const pendingDataSaves = [];

    // Clean up stale jsPsych wrappers from previous runs (prevents stacking on restarts)
    document.querySelectorAll('.jspsych-content-wrapper').forEach(el => el.remove());

    const jsPsych = initJsPsych({
            


    

    on_data_update: function (data) {
      // Create and track the promise for this data save
      const savePromise = fetch("/api/append-result/b116f718-cfee-4d6d-82d0-5c8f948ecb6a", {
        method: "PUT",
        headers: { "Content-Type": "application/json", Accept: "*/*" },
        body: JSON.stringify({
          sessionId: trialSessionId,
          response: data,
        }),
      })
      .then(res => {
        if (!res.ok) {
          console.error('Error saving trial data:', res.statusText);
        }
        return res;
      })
      .catch(error => {
        console.error('Error in on_data_update:', error);
      })
      .finally(() => {
        // Remove from pending once complete
        const index = pendingDataSaves.indexOf(savePromise);
        if (index > -1) {
          pendingDataSaves.splice(index, 1);
        }
      });
      
      pendingDataSaves.push(savePromise);

      // 🔄 SISTEMA DE RETOMA: Guardar branches + datos del trial para evaluar al reanudar
      if (data.builder_id !== undefined && data.builder_id !== null) {
        localStorage.setItem('jsPsych_resumeTrial', JSON.stringify({
          branches: data.branches || [],
          branchConditions: data.branchConditions || [],
          trialData: data
        }));
      }
      
      // Actualizar estado a 'in-progress' en la primera actualización
      if (data.trial_index === 0 && socket) {
        socket.emit('update-session-state', {
          experimentID: 'b116f718-cfee-4d6d-82d0-5c8f948ecb6a',
          sessionId: trialSessionId,
          state: 'in-progress'
        });
      }
      
      // Solo evaluar branching si el trial/loop tiene un trial_id o loop_id válido
      if ((!data.trial_id || data.trial_id === undefined) && (!data.loop_id || data.loop_id === undefined)) {
        return;
      }
      
      const lastTrialData = jsPsych.data.getLastTrialData();
      const trial = lastTrialData.trials ? lastTrialData.trials[0] : null;
      
      // Verificar si este trial/loop tiene branches
      if (!trial || !trial.branches || trial.branches.length === 0) {
        return; // No tiene branches, no hay nada que hacer
      }
      
      // IMPORTANTE: Si el trial está dentro de un loop (isInLoop = true),
      // NO activar el branching global. Los trials dentro de loops usan su propio
      // sistema de branching con variables locales (loopNextTrialId, etc.)
      if (trial.isInLoop === true) {
        return;
      }
      
      const nextTrialId = getNextTrialId(lastTrialData);
      
      if (nextTrialId) {
        // Check if nextTrialId is "FINISH_EXPERIMENT"
        if (nextTrialId === 'FINISH_EXPERIMENT') {
          console.log('🏁 [BRANCHING] Finishing experiment via branching');
          jsPsych.abortExperiment('Experiment finished by branching condition', {});
          return;
        }
